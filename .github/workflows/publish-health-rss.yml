name: Publish health RSS

on:
  workflow_dispatch:
    inputs:
      report_type:
        description: Report to publish
        required: true
        default: daily
        type: choice
        options:
          - daily
          - weekly
  schedule:
    - cron: '30 14 * * *' # 00:30 Australia/Brisbane
    - cron: '0 23 * * 6' # Sunday 09:00 Australia/Brisbane
  push:
    branches:
      - main
    paths:
      - 'health_exports/*.json'
      - '*.py'
      - 'requirements.txt'
      - '.github/workflows/publish-health-rss.yml'

concurrency:
  group: health-rss-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HEALTH_EXPORT_DIR: health_exports
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-4o-mini
      OPENAI_TIMEOUT_SECONDS: 4
      REPORT_DAYS: 7
      RSS_OUTPUT_PATH: public/health-report.xml
      RSS_FEED_TITLE: Hope Health Report
      RSS_FEED_LINK: https://cdn.jsdelivr.net/gh/${{ github.repository_owner }}/${{ github.event.repository.name }}@main/public/health-report.xml
      RSS_MAX_ITEMS: 30
      RSS_CDN_URL: https://cdn.jsdelivr.net/gh/${{ github.repository_owner }}/${{ github.event.repository.name }}@main/public/health-report.xml
      RSS_CDN_PURGE_URL: https://purge.jsdelivr.net/gh/${{ github.repository_owner }}/${{ github.event.repository.name }}@main/public/health-report.xml
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Publish daily RSS item
        if: >-
          (github.event_name == 'workflow_dispatch' && inputs.report_type == 'daily') ||
          (github.event_name == 'push') ||
          (github.event_name == 'schedule' && github.event.schedule != '0 23 * * 6')
        run: python main.py --rss-only
      - name: Publish weekly RSS item
        if: >-
          (github.event_name == 'workflow_dispatch' && inputs.report_type == 'weekly') ||
          (github.event_name == 'schedule' && github.event.schedule == '0 23 * * 6')
        run: python main.py --weekly --rss-only
      - name: Commit RSS feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/health-report.xml
          if git diff --cached --quiet; then
            echo "No RSS changes to commit."
          else
            git commit -m "Update health RSS feed"
            git pull --rebase --autostash origin main
            git push
          fi
      - name: Purge RSS CDN cache
        if: always()
        run: |
          curl -fsSL "$RSS_CDN_PURGE_URL" || true
          curl -fsSL "$RSS_CDN_URL" >/dev/null || true
